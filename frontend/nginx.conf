server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # HOVER PDFs / AI image uploads can be large.
    client_max_body_size 50m;

    # Reverse-proxy the API to the backend container so the browser sees a
    # single origin (http://localhost:3000) — keeps the auth cookie first-party.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — every non-file route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
