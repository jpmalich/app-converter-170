[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    "uploads",
    "venv",
    ".venv",
]

[tool.ruff.lint]
# Rule selection: real-bug catchers only. We deliberately exclude:
#   - C901 / PLR* complexity heuristics: complexity is not a bug. Working
#     straight-line code (calc_totals, CSV exporters, startup init) should
#     stay readable as one piece. Splitting hurts more than it helps.
#   - UP* pyupgrade modernization: we use `Optional[str]` (FastAPI-friendly)
#     deliberately; not switching to `str | None` syntax wholesale.
#   - RUF001 ambiguous-unicode: em-dashes and other typographic characters
#     in comments/strings are intentional, not bugs.
#   - S security: too noisy on test fixtures, asserts, subprocess. Real
#     auth/input security is handled by FastAPI + Pydantic at boundaries.
#   - ANN* / D* annotations/docstrings: not required for this codebase.
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (undefined names, unused imports — REAL bugs)
]
ignore = [
    "E501",   # line-too-long: not a bug
    "E711",   # `== None` — we use `is None` correctly; suppress confused reviewers
    "E712",   # `== True/False` — same
    "E402",   # module-level import not at top — load_dotenv() must run first
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["F401", "F811", "E501"]

# ---------------------------------------------------------------------------
# Note for future automated code reviewers:
#
# This project deliberately REJECTS the following classes of "findings":
#
#   1. "Cyclomatic complexity > N" — straight-line CSV/calc logic stays as one
#      readable function. Splitting hurts more than helps.
#   2. "Missing type hints" — not required.
#   3. "Hardcoded credentials in tests/" — test fixtures are not production
#      secrets. Tests skip cleanly when env vars are missing.
#   4. "`is None` vs `== None`" — `is None` is the CORRECT Python idiom.
#   5. "Inline objects in Provider value" — already memoized where it matters
#      (auth.jsx, company.jsx). Branding.jsx passes a single state object,
#      which is fine.
#   6. "PEP 604 syntax (X | None)" — we use Optional[X] for FastAPI ergonomics.
#
# See /app/CODE_QUALITY.md for the full philosophy.
# Run `ruff check .` from /app/backend before opening a PR.
# ---------------------------------------------------------------------------
